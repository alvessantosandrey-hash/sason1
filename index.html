<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boxe Arcade - Movimentação Livre</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            border: 5px solid #fff;
            background: radial-gradient(circle, #555, #111);
            overflow: hidden;
        }

        @keyframes idle {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .fighter {
            position: absolute;
            width: 70px;
            height: 130px;
            transition: transform 0.1s;
        }

        .visual-container {
            animation: idle 0.5s ease-in-out infinite alternate;
        }

        /* Cabeça */
        .fighter::before {
            content: '';
            position: absolute;
            top: -45px;
            left: 12px;
            width: 45px;
            height: 45px;
            background-color: #ffdbac;
            border-radius: 50%;
            border: 3px solid #000;
        }

        /* Tronco */
        .body-visual {
            width: 100%;
            height: 100%;
            background-color: #f1c40f;
            border-radius: 15px 15px 5px 5px;
            border: 3px solid #000;
        }

        #enemy .body-visual { background-color: #e74c3c; }
        #enemy::before { background-color: #8d5524; }
        #enemy { transform: scaleX(-1); }

        .fist {
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: #333;
            border-radius: 50%;
            top: 40px;
            left: 20px;
            display: none;
            border: 2px solid #000;
            z-index: 10;
        }

        /* Golpes */
        .jab { display: block; transform: translateX(80px); }
        .direto { display: block; transform: translateX(130px); width: 45px; }
        .hook { display: block; transform: translate(60px, -40px); }

        .ui { margin-top: 20px; text-align: center; }
        .health-bar { width: 250px; height: 20px; background: #555; border: 2px solid #fff; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #player-hp { background: #2ecc71; }
        #enemy-hp { background: #e74c3c; }

        .shake { animation: shake-anim 0.2s; }
        @keyframes shake-anim {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
        }
    </style>
</head>
<body>

    <div style="display: flex; gap: 50px; margin-bottom: 10px;">
        <div>Player: <div class="health-bar"><div id="player-hp" class="health-fill"></div></div></div>
        <div>Oponente: <div class="health-bar"><div id="enemy-hp" class="health-fill"></div></div></div>
    </div>

    <div id="game-container">
        <div id="player" class="fighter" style="left: 100px; top: 200px;">
            <div class="visual-container">
                <div class="body-visual"></div>
                <div id="player-fist" class="fist"></div>
            </div>
        </div>
        <div id="enemy" class="fighter" style="left: 400px; top: 200px;">
            <div class="visual-container">
                <div class="body-visual"></div>
                <div id="enemy-fist" class="fist"></div>
            </div>
        </div>
    </div>

    <div class="ui">
        <p id="msg">MOVA COM <b>WASD</b> | ATAQUE COM <b>J, K, L</b></p>
    </div>

    <script>
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const playerFist = document.getElementById('player-fist');
        const enemyFist = document.getElementById('enemy-fist');
        const container = document.getElementById('game-container');
        const msg = document.getElementById('msg');

        let pPos = { x: 100, y: 200 };
        let ePos = { x: 400, y: 200 };
        let playerHealth = 100;
        let enemyHealth = 100;
        let isAttacking = false;

        // Sistema de Movimentação WASD
        document.addEventListener('keydown', (e) => {
            if (playerHealth <= 0) return;
            const key = e.key.toLowerCase();
            const step = 15;

            // Movimento
            if (key === 'w' && pPos.y > 50) pPos.y -= step;
            if (key === 's' && pPos.y < 270) pPos.y += step;
            if (key === 'a' && pPos.x > 0) pPos.x -= step;
            if (key === 'd' && pPos.x < 530) pPos.x += step;

            // Ataques
            if (!isAttacking) {
                if (key === 'j') attack('jab', 5, 150);
                if (key === 'k') attack('direto', 12, 350);
                if (key === 'l') attack('hook', 20, 500);
            }

            updatePositions();
        });

        function updatePositions() {
            player.style.left = pPos.x + 'px';
            player.style.top = pPos.y + 'px';
            enemy.style.left = ePos.x + 'px';
            enemy.style.top = ePos.y + 'px';
        }

        function attack(type, damage, speed) {
            isAttacking = true;
            playerFist.className = 'fist ' + type;

            // Verifica colisão (distância entre lutadores)
            const dist = Math.abs(pPos.x - ePos.x);
            const yDist = Math.abs(pPos.y - ePos.y);

            setTimeout(() => {
                if (dist < 150 && yDist < 50) { // Só acerta se estiver perto
                    enemyHealth -= damage;
                    updateBars();
                    msg.innerText = "ACERTOU!";
                } else {
                    msg.innerText = "ERROU O GOLPE!";
                }
            }, speed / 2);

            setTimeout(() => {
                playerFist.className = 'fist';
                isAttacking = false;
                if(enemyHealth > 0) enemyIA();
            }, speed);
        }

        function enemyIA() {
            // IA simples: persegue o jogador lentamente
            if (ePos.x > pPos.x + 80) ePos.x -= 5;
            if (ePos.x < pPos.x + 80) ePos.x += 5;
            if (ePos.y > pPos.y) ePos.y -= 5;
            if (ePos.y < pPos.y) ePos.y += 5;

            // Chance de contra-ataque se estiver perto
            if (Math.random() > 0.95 && Math.abs(ePos.x - pPos.x) < 100) {
                enemyFist.className = 'fist jab';
                playerHealth -= 5;
                updateBars();
                setTimeout(() => enemyFist.className = 'fist', 200);
            }
            updatePositions();
        }

        // Loop da IA para movimento fluido
        setInterval(() => {
            if (enemyHealth > 0 && playerHealth > 0) enemyIA();
        }, 100);

        function updateBars() {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 200);

            document.getElementById('enemy-hp').style.width = Math.max(0, enemyHealth) + "%";
            document.getElementById('player-hp').style.width = Math.max(0, playerHealth) + "%";

            if (enemyHealth <= 0) msg.innerText = "VITÓRIA!";
            if (playerHealth <= 0) msg.innerText = "DERROTA!";
        }
    </script>
</body>
</html>
