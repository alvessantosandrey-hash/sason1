<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zombie Survival HTML5</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #222; border: 2px solid #444; margin: 10px auto; }
        #ui { text-align: center; font-size: 20px; }
        .stats { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    Vida: <span id="health" class="stats">100</span> | 
    Pontos: <span id="score">0</span>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 500;

// Configurações do Jogador
const player = {
    x: 400, y: 250, size: 20, color: "#0095DD",
    speed: 4, health: 100
};

// Listas de objetos
let zombies = [];
let bullets = [];
let score = 0;
let keys = {};

// Controles
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Atirar ao clicar
window.addEventListener("mousedown", e => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    // Calcula o ângulo para a bala
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    bullets.push({
        x: player.x, y: player.y,
        speed: 7, 
        vx: Math.cos(angle) * 7,
        vy: Math.sin(angle) * 7
    });
});

function spawnZombie() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if(side === 0) { x = Math.random() * canvas.width; y = -30; } // Topo
    else if(side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; } // Direita
    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; } // Baixo
    else { x = -30; y = Math.random() * canvas.height; } // Esquerda

    zombies.push({ x, y, size: 20, speed: 1.5 });
}

// Criar zumbi a cada 1.5 segundos
setInterval(spawnZombie, 1500);

function update() {
    if (player.health <= 0) return alert("Fim de Jogo! Pontos: " + score) || location.reload();

    // Movimentação
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    // Limites da tela
    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    // Atualizar Balas
    bullets.forEach((b, i) => {
        b.x += b.vx;
        b.y += b.vy;
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    // Atualizar Zumbis
    zombies.forEach((z, zi) => {
        const dx = player.x - z.x;
        const dy = player.y - z.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        // Seguir jogador
        z.x += (dx/dist) * z.speed;
        z.y += (dy/dist) * z.speed;

        // Colisão Zumbi x Jogador
        if(dist < player.size) {
            player.health -= 0.5;
            document.getElementById("health").innerText = Math.floor(player.health);
        }

        // Colisão Zumbi x Bala
        bullets.forEach((b, bi) => {
            const bDist = Math.sqrt((z.x - b.x)**2 + (z.y - b.y)**2);
            if(bDist < z.size) {
                zombies.splice(zi, 1);
                bullets.splice(bi, 1);
                score += 10;
                document.getElementById("score").innerText = score;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenhar Jogador
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - 10, player.y - 10, player.size, player.size);

    // Desenhar Balas
    ctx.fillStyle = "yellow";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));

    // Desenhar Zumbis
    ctx.fillStyle = "#33ff33";
    zombies.forEach(z => ctx.fillRect(z.x - 10, z.y - 10, z.size, z.size));

    update();
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

<html lang="pt-br">
<head>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        
        /* Efeito de vinheta para focar o olhar e dar realismo */
        .vignette {
            fixed: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;

<body>
    <div class="vignette"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const player = { x: 100, y: 100, size: 30 };

        function draw() {
            // Fundo com leve gradiente para simular distância
            const bgGradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0, 
                canvas.width/2, canvas.height/2, canvas.width
            );
            bgGradient.addColorStop(0, '#1a1a1a');
            bgGradient.addColorStop(1, '#000000');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simulação de Iluminação Dinâmica (Luz que segue o jogador)
            let light = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 300);
            light.addColorStop(0, 'rgba(255, 255, 200, 0.15)');
            light.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = light;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Objeto com sombra projetada
            ctx.shadowBlur = 15;
            ctx.shadowColor = "black";
            ctx.fillStyle = "#444";
            ctx.fillRect(player.x - 15, player.y - 15, player.size, player.size);
            
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        draw();
    </script>
</body>
</html>
