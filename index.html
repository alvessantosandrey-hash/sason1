<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Retro Boxing Challenge</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 300px;
            border: 5px solid #fff;
            background: linear-gradient(to bottom, #444, #111);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        .fighter {
            width: 80px;
            height: 150px;
            background-color: #f1c40f;
            position: relative;
            transition: transform 0.1s;
            border-radius: 10px 10px 0 0;
        }

        #enemy { background-color: #e74c3c; transform: scaleX(-1); }

        .fist {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #c0392b;
            border-radius: 50%;
            top: 40px;
            display: none;
        }

        /* Estilos de Golpes */
        .jab { width: 60px; left: 80px; display: block; }
        .direto { width: 90px; left: 80px; display: block; background-color: #d35400; }
        .hook { width: 50px; height: 60px; left: 60px; top: 20px; display: block; background-color: #8e44ad; }

        .ui { margin-top: 20px; text-align: center; }
        .health-bar { width: 250px; height: 20px; background: #555; border: 2px solid #fff; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #player-hp { background: #2ecc71; }
        #enemy-hp { background: #e74c3c; }

        .controls-hint { font-size: 0.9em; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>BOXE ARCADE</h1>

    <div style="display: flex; gap: 50px; margin-bottom: 10px;">
        <div>Player: <div class="health-bar"><div id="player-hp" class="health-fill"></div></div></div>
        <div>Oponente: <div class="health-bar"><div id="enemy-hp" class="health-fill"></div></div></div>
    </div>

    <div id="game-container">
        <div id="player" class="fighter">
            <div id="player-fist" class="fist"></div>
        </div>
        <div id="enemy" class="fighter">
            <div id="enemy-fist" class="fist"></div>
        </div>
    </div>

    <div class="ui">
        <p id="msg">USE O TECLADO PARA ATACAR!</p>
        <div class="controls-hint">
            <strong>A</strong>: Jab (Rápido) | 
            <strong>S</strong>: Direto (Forte) | 
            <strong>D</strong>: Gancho (Crítico)
        </div>
    </div>

    <script>
        const playerFist = document.getElementById('player-fist');
        const enemyFist = document.getElementById('enemy-fist');
        const msg = document.getElementById('msg');
        
        let enemyHealth = 100;
        let playerHealth = 100;
        let isAttacking = false;

        document.addEventListener('keydown', (e) => {
            if (isAttacking || enemyHealth <= 0) return;

            const key = e.key.toLowerCase();
            if (key === 'a') attack('jab', 5, 100);
            if (key === 's') attack('direto', 12, 300);
            if (key === 'd') attack('hook', 25, 600);
        });

        function attack(type, damage, speed) {
            isAttacking = true;
            playerFist.className = 'fist ' + type;
            
            // Lógica de acerto
            setTimeout(() => {
                enemyHealth -= damage;
                updateBars();
                msg.innerText = `Você usou ${type.toUpperCase()}! -${damage} HP`;
                
                if (enemyHealth <= 0) {
                    msg.innerText = "K.O.! VOCÊ VENCEU!";
                    document.getElementById('enemy').style.opacity = '0.3';
                }
            }, speed / 2);

            // Reset da animação
            setTimeout(() => {
                playerFist.className = 'fist';
                isAttacking = false;
                if(enemyHealth > 0) enemyCounter();
            }, speed);
        }

        function enemyCounter() {
            if (Math.random() > 0.7) { // 30% de chance de contra-ataque
                enemyFist.className = 'fist jab';
                playerHealth -= 8;
                updateBars();
                setTimeout(() => enemyFist.className = 'fist', 200);
            }
        }

        function updateBars() {
            document.getElementById('enemy-hp').style.width = Math.max(0, enemyHealth) + "%";
            document.getElementById('player-hp').style.width = Math.max(0, playerHealth) + "%";
            
            if (playerHealth <= 0) {
                msg.innerText = "VOCÊ FOI DERROTADO!";
                document.getElementById('player').style.opacity = '0.3';
            }
        }
    </script>
</body>
</html>
