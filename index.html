<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Retro Boxing - Com Pernas</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            border: 5px solid #fff;
            background: radial-gradient(circle, #444, #111);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Animação de pulo do boxeador (Idle) */
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        /* Animação das Pernas (Caminhada) */
        @keyframes walk {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(20deg); }
        }

        .fighter {
            position: absolute;
            width: 70px;
            height: 120px;
            transition: left 0.1s, top 0.1s;
        }

        .visual-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            animation: bounce 0.4s ease-in-out infinite alternate;
        }

        /* Cabeça */
        .fighter::before {
            content: '';
            position: absolute;
            top: -45px;
            left: 12px;
            width: 45px;
            height: 45px;
            background-color: #ffdbac;
            border-radius: 50%;
            border: 3px solid #000;
            z-index: 2;
        }

        /* Tronco */
        .body-visual {
            width: 100%;
            height: 80%; /* Reduzi para caber as pernas */
            background-color: #f1c40f;
            border-radius: 15px 15px 5px 5px;
            border: 3px solid #000;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Pernas */
        .legs-container {
            position: absolute;
            bottom: -10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 1;
        }

        .leg {
            width: 12px;
            height: 35px;
            background-color: #333; /* Cor do calção/perna */
            border: 2px solid #000;
            border-radius: 0 0 5px 5px;
            transform-origin: top center;
            animation: walk 0.2s ease-in-out infinite alternate;
        }

        .leg.right {
            animation-delay: 0.1s;
        }

        /* Inimigo */
        #enemy .body-visual { background-color: #e74c3c; }
        #enemy::before { background-color: #8d5524; }
        #enemy { transform: scaleX(-1); }

        /* Luvas */
        .fist {
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: #333;
            border-radius: 50%;
            top: 30px;
            left: 20px;
            display: none;
            border: 2px solid #000;
            z-index: 5;
        }

        .jab { display: block; transform: translateX(90px); }
        .direto { display: block; transform: translateX(140px); width: 45px; }
        .hook { display: block; transform: translate(70px, -40px); }

        /* UI */
        .ui { margin-top: 20px; text-align: center; }
        .health-bar { width: 250px; height: 20px; background: #555; border: 2px solid #fff; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #player-hp { background: #2ecc71; }
        #enemy-hp { background: #e74c3c; }

        .shake { animation: shake-anim 0.2s; }
        @keyframes shake-anim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div style="display: flex; gap: 50px; margin-bottom: 10px;">
        <div>Player: <div class="health-bar"><div id="player-hp" class="health-fill"></div></div></div>
        <div>Oponente: <div class="health-bar"><div id="enemy-hp" class="health-fill"></div></div></div>
    </div>

    <div id="game-container">
        <div id="player" class="fighter" style="left: 100px; top: 200px;">
            <div class="visual-wrapper">
                <div class="body-visual"></div>
                <div id="player-fist" class="fist"></div>
                <div class="legs-container">
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
            </div>
        </div>

        <div id="enemy" class="fighter" style="left: 400px; top: 200px;">
            <div class="visual-wrapper">
                <div class="body-visual"></div>
                <div id="enemy-fist" class="fist"></div>
                <div class="legs-container">
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ui">
        <p id="msg"><b>WASD</b>: Mover | <b>J, K, L</b>: Atacar</p>
    </div>

    <script>
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const playerFist = document.getElementById('player-fist');
        const enemyFist = document.getElementById('enemy-fist');
        const container = document.getElementById('game-container');
        const msg = document.getElementById('msg');

        let pPos = { x: 100, y: 200 };
        let ePos = { x: 400, y: 200 };
        let playerHealth = 100;
        let enemyHealth = 100;
        let isAttacking = false;

        document.addEventListener('keydown', (e) => {
            if (playerHealth <= 0 || enemyHealth <= 0) return;
            const key = e.key.toLowerCase();
            const step = 20;

            if (key === 'w' && pPos.y > 60) pPos.y -= step;
            if (key === 's' && pPos.y < 280) pPos.y += step;
            if (key === 'a' && pPos.x > 0) pPos.x -= step;
            if (key === 'd' && pPos.x < 530) pPos.x += step;

            if (!isAttacking) {
                if (key === 'j') attack('jab', 5, 150);
                if (key === 'k') attack('direto', 12, 300);
                if (key === 'l') attack('hook', 20, 500);
            }
            updatePositions();
        });

        function updatePositions() {
            player.style.left = pPos.x + 'px';
            player.style.top = pPos.y + 'px';
            enemy.style.left = ePos.x + 'px';
            enemy.style.top = ePos.y + 'px';
        }

        function attack(type, damage, speed) {
            isAttacking = true;
            playerFist.className = 'fist ' + type;

            const dx = Math.abs(pPos.x - ePos.x);
            const dy = Math.abs(pPos.y - ePos.y);

            setTimeout(() => {
                if (dx < 140 && dy < 60) {
                    enemyHealth -= damage;
                    updateBars();
                    msg.innerText = "GOLPE CONECTADO!";
                } else {
                    msg.innerText = "ERROU!";
                }
            }, speed / 2);

            setTimeout(() => {
                playerFist.className = 'fist';
                isAttacking = false;
            }, speed);
        }

        setInterval(() => {
            if (enemyHealth <= 0 || playerHealth <= 0) return;
            
            if (ePos.x > pPos.x + 90) ePos.x -= 3;
            if (ePos.x < pPos.x + 90) ePos.x += 3;
            if (ePos.y > pPos.y) ePos.y -= 2;
            if (ePos.y < pPos.y) ePos.y += 2;

            if (Math.random() > 0.97 && Math.abs(ePos.x - pPos.x) < 120) {
                enemyFist.className = 'fist jab';
                playerHealth -= 4;
                updateBars();
                setTimeout(() => enemyFist.className = 'fist', 200);
            }
            updatePositions();
        }, 50);

        function updateBars() {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 200);
            document.getElementById('enemy-hp').style.width = Math.max(0, enemyHealth) + "%";
            document.getElementById('player-hp').style.width = Math.max(0, playerHealth) + "%";

            if (enemyHealth <= 0) msg.innerText = "K.O.! VOCÊ VENCEU!";
            if (playerHealth <= 0) msg.innerText = "VOCÊ FOI DERROTADO!";
        }
    </script>
</body>
</html>
