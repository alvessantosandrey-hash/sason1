<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zumbi Shooter Pro - Sobrevivência Extrema</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #ff4444; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
            user-select: none; z-index: 10;
        }
        .stats { font-size: 14px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        PONTOS: <span id="score">0</span>
        <div class="stats" id="level">INTENSIDADE: 100%</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let speedMultiplier = 1.0;
        let frameCount = 0;
        let screenShake = 0;
        
        const keys = {};
        const mouse = { x: 0, y: 0, pressed: false };
        
        // Arrays de objetos
        const projectiles = [];
        const enemies = [];
        const particles = [];
        const bloodSplats = []; // Sangue que fica no chão

        // Configurações
        const PLAYER_SPEED = 4;
        const BULLET_SPEED = 14;
        const FIRE_RATE = 10; // Atira a cada 10 frames

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.radius = 18;
                this.angle = 0;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(3, 3, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Corpo
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#2980b9';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Arma
                ctx.fillStyle = '#333';
                ctx.fillRect(10, -5, 18, 10);
                ctx.restore();
            }
            update() {
                if (keys['w']) this.y -= PLAYER_SPEED;
                if (keys['s']) this.y += PLAYER_SPEED;
                if (keys['a']) this.x -= PLAYER_SPEED;
                if (keys['d']) this.x += PLAYER_SPEED;

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
            }
        }

        class Enemy {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.type = type;
                
                if (type === 'fast') {
                    this.radius = 12;
                    this.speed = (3.5 + Math.random()) * speedMultiplier;
                    this.hp = 1;
                    this.color = '#f1c40f';
                } else if (type === 'tank') {
                    this.radius = 30;
                    this.speed = (1 + Math.random()) * speedMultiplier;
                    this.hp = 5;
                    this.color = '#c0392b';
                } else {
                    this.radius = 18;
                    this.speed = (2 + Math.random()) * speedMultiplier;
                    this.hp = 2;
                    this.color = '#2ecc71';
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // Olhos
                ctx.fillStyle = 'white';
                const eyeOffset = this.radius/3;
                ctx.fillRect(this.x - eyeOffset, this.y - eyeOffset, 4, 4);
                ctx.fillRect(this.x + eyeOffset - 4, this.y - eyeOffset, 4, 4);
            }
            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.radius = Math.random() * 4;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.alpha = 1;
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.03;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        const player = new Player();

        // Eventos
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onmousedown = () => mouse.pressed = true;
        window.onmouseup = () => mouse.pressed = false;

        function spawnEnemy() {
            if (!gameActive) return;
            const radius = 30;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -radius : canvas.height + radius;
            }
            
            const rand = Math.random();
            let type = 'normal';
            if (rand > 0.8) type = 'fast';
            if (rand > 0.92) type = 'tank';
            
            enemies.push(new Enemy(x, y, type));
            
            let nextSpawn = Math.max(200, 1000 / speedMultiplier);
            setTimeout(spawnEnemy, nextSpawn);
        }

        function createExplosion(x, y, color, count = 10) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, color));
            }
            // Adiciona mancha de sangue fixa
            bloodSplats.push({x, y, r: Math.random() * 20 + 10, a: 0.4});
            if (bloodSplats.length > 100) bloodSplats.shift();
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            frameCount++;

            // Efeito de tremor
            ctx.save();
            if (screenShake > 0) {
                ctx.translate(Math.random()*screenShake - screenShake/2, Math.random()*screenShake - screenShake/2);
                screenShake *= 0.9;
            }

            // Fundo
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar sangue no chão
            bloodSplats.forEach(s => {
                ctx.beginPath();
                ctx.fillStyle = `rgba(200, 0, 0, ${s.a})`;
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Tiros automáticos
            if (mouse.pressed && frameCount % FIRE_RATE === 0) {
                projectiles.push({
                    x: player.x, y: player.y,
                    v: { x: Math.cos(player.angle) * BULLET_SPEED, y: Math.sin(player.angle) * BULLET_SPEED }
                });
            }

            // Update Projéteis
            projectiles.forEach((p, i) => {
                p.x += p.v.x; p.y += p.v.y;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(i, 1);
            });

            // Partículas
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            });

            player.update();
            player.draw();

            // Update Inimigos
            enemies.forEach((en, i) => {
                en.update();
                en.draw();

                // Colisão Jogador
                if (Math.hypot(player.x - en.x, player.y - en.y) < player.radius + en.radius) {
                    gameActive = false;
                    alert("VOCÊ MORREU! Pontos: " + score);
                    location.reload();
                }

                // Colisão Projétil
                projectiles.forEach((p, pi) => {
                    if (Math.hypot(p.x - en.x, p.y - en.y) < en.radius + 4) {
                        projectiles.splice(pi, 1);
                        en.hp--;
                        createExplosion(p.x, p.y, en.color, 3);
                        
                        if (en.hp <= 0) {
                            createExplosion(en.x, en.y, en.color, 15);
                            enemies.splice(i, 1);
                            score += (en.type === 'tank' ? 50 : 10);
                            scoreElement.innerText = score;
                            screenShake = 5;
                            
                            speedMultiplier += 0.01;
                            levelElement.innerText = `INTENSIDADE: ${Math.round(speedMultiplier * 100)}%`;
                        }
                    }
                });
            });

            // Efeito de Lanterna/Vinheta
            const grad = ctx.createRadialGradient(player.x, player.y, 100, player.x, player.y, 500);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(1, 'rgba(0,0,0,0.7)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.restore();
        }

        spawnEnemy();
        animate();
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo 3D de Alta Qualidade</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Configuração da Cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        // 2. Câmera com perspectiva realista
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 3. Renderizador com Alta Qualidade (Antialias ativado)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Ajusta para telas Retina/4K
        renderer.shadowMap.enabled = true; // Habilita sombras
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves
        document.body.appendChild(renderer.domElement);

        // 4. Iluminação (Fundamental para "qualidade boa")
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 50);
        spotLight.position.set(2, 5, 2);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // 5. Objeto 3D (Um cubo com material que reage à luz)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88,
            metalness: 0.7,
            roughness: 0.2
        });
        const cube = new THREE.Mesh(geometry, material);
        cube.castShadow = true;
        scene.add(cube);

        // Chão para receber sombra
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -1;
        plane.receiveShadow = true;
        scene.add(plane);

        // 6. Animação
        function animate() {
            requestAnimationFrame(animate);
            
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            
            renderer.render(scene, camera);
        }

        // Ajuste de tela responsivo
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
