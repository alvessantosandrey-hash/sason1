<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini God of War Clone</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #444; background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>GOD OF JS</h1>
        <p>Use as <b>Setas</b> para mover e <b>Espaço</b> para atacar!</p>
        <p>Inimigos derrotados: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = 800;
    canvas.height = 400;

    let score = 0;

    const player = {
        x: 50, y: 300, w: 40, h: 60,
        color: '#e74c3c', // Vermelho Kratos
        speed: 5,
        attacking: false,
        attackRange: 60
    };

    const enemies = [];
    function spawnEnemy() {
        enemies.push({
            x: canvas.width,
            y: 320,
            w: 30,
            h: 40,
            color: '#2ecc71',
            speed: 2
        });
    }

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        if(e.code === 'Space') player.attacking = false;
    });

    function update() {
        // Movimentação
        if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
        
        // Ataque
        if (keys['Space']) player.attacking = true;

        // Lógica dos Inimigos
        enemies.forEach((enemy, index) => {
            enemy.x -= enemy.speed;

            // Colisão com ataque
            if (player.attacking && 
                player.x + player.w + player.attackRange > enemy.x &&
                player.x < enemy.x + enemy.w) {
                enemies.splice(index, 1);
                score++;
                scoreEl.innerText = score;
            }

            // Reiniciar se inimigo passar
            if (enemy.x + enemy.w < 0) enemies.splice(index, 1);
        });

        if (Math.random() < 0.02) spawnEnemy();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Chão
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 360, canvas.width, 40);

        // Jogador
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        
        // Marca da tatuagem do Kratos
        ctx.fillStyle = '#fff';
        ctx.fillRect(player.x + 10, player.y, 5, 30);

        // Efeito de Ataque
        if (player.attacking) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(player.x + player.w, player.y + 20, player.attackRange, 10);
        }

        // Inimigos
        enemies.forEach(enemy => {
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
        });

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    draw();
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>God of JS - Unleashed</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { border: 4px solid #600; background: #1a1a1a; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px 4px #000; }
        .special-bar { width: 200px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 10px; }
        #specialFill { width: 100%; height: 100%; background: #f1c40f; transition: width 0.1s; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>GOD OF JS</h1>
        <p>Mova com as <b>Setas</b> | <b>Espaço</b>: Ataque | <b>E</b>: Especial</p>
        <p>Inimigos: <span id="score">0</span></p>
        <div>Especial (E):</div>
        <div class="special-bar"><div id="specialFill"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const specialFill = document.getElementById('specialFill');

    canvas.width = 800;
    canvas.height = 450;

    let score = 0;
    let specialReady = true;
    let specialCooldown = 0;

    const player = {
        x: 100, y: 200, w: 40, h: 60,
        color: '#e74c3c',
        speed: 6,
        attacking: false,
        usingSpecial: false,
        attackRange: 70,
        specialRange: 150
    };

    const enemies = [];
    function spawnEnemy() {
        enemies.push({
            x: canvas.width,
            y: Math.random() * (canvas.height - 100) + 50,
            w: 35, h: 45,
            color: '#2ecc71',
            speed: 2 + (score * 0.1) // Dificuldade progressiva
        });
    }

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        if(e.code === 'Space') player.attacking = false;
        if(e.code === 'KeyE') player.usingSpecial = false;
    });

    function update() {
        // Movimentação 8 direções
        if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
        if (keys['ArrowUp'] && player.y > 50) player.y -= player.speed;
        if (keys['ArrowDown'] && player.y < canvas.height - player.h - 20) player.y += player.speed;
        
        // Ataque Comum
        player.attacking = keys['Space'];

        // Ataque Especial (E)
        if (keys['KeyE'] && specialReady) {
            player.usingSpecial = true;
            specialReady = false;
            specialCooldown = 100; // Tempo de recarga
            
            // O especial limpa uma área maior
            setTimeout(() => player.usingSpecial = false, 300);
        }

        // Recarga do especial
        if (!specialReady) {
            specialCooldown--;
            specialFill.style.width = (100 - specialCooldown) + '%';
            if (specialCooldown <= 0) {
                specialReady = true;
                specialFill.style.backgroundColor = '#f1c40f';
            } else {
                specialFill.style.backgroundColor = '#555';
            }
        }

        // Lógica dos Inimigos
        enemies.forEach((enemy, index) => {
            enemy.x -= enemy.speed;

            // Colisão com ataque normal
            let hitNormal = player.attacking && 
                player.x + player.w + player.attackRange > enemy.x &&
                player.x < enemy.x + enemy.w &&
                Math.abs(player.y - enemy.y) < 40;

            // Colisão com ataque especial (área circular em volta do player)
            let dist = Math.sqrt(Math.pow(player.x - enemy.x, 2) + Math.pow(player.y - enemy.y, 2));
            let hitSpecial = player.usingSpecial && dist < player.specialRange;

            if (hitNormal || hitSpecial) {
                enemies.splice(index, 1);
                score++;
                scoreEl.innerText = score;
            }

            if (enemy.x + enemy.w < 0) enemies.splice(index, 1);
        });
