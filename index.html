
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zombie Hunter - Survival</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #2d3436;
            cursor: crosshair;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
        .ui {
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ui">Pontos: <span id="score">0</span> | Vidas: <span id="lives">3</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');

        // Ajuste do tamanho do canvas
        canvas.width = 800;
        canvas.height = 600;

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let enemies = [];
        let spawnRate = 1000; // 1 segundo inicial

        class Zombie {
            constructor() {
                this.radius = 20;
                // Nasce em bordas aleatórias
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? 0 - this.radius : canvas.width + this.radius;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? 0 - this.radius : canvas.height + this.radius;
                }
                
                this.speed = 1 + Math.random() * 1.5;
                this.color = '#55efc4'; // Verde zumbi
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = '#00b894';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.closePath();
            }

            update() {
                // Persegue o centro do canvas (onde o jogador estaria)
                const dx = (canvas.width / 2) - this.x;
                const dy = (canvas.height / 2) - this.y;
                const angle = Math.atan2(dy, dx);
                
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                // Checa colisão com o centro (jogador)
                const dist = Math.hypot(dx, dy);
                if (dist < this.radius + 10) {
                    lives--;
                    livesElement.innerText = lives;
                    return true; // Remover zumbi após hit
                }
                return false;
            }
        }

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sniper Training - HTML Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Impede scroll durante o jogo */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-viewport {
            position: relative;
            width: 800px;
            height: 500px;
            background: #333 url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 4px solid #555;
            margin-top: 20px;
            cursor: crosshair; /* Cursor de mira */
            overflow: hidden;
        }

        #ui {
            margin-top: 10px;
            font-size: 24px;
            display: flex;
            gap: 30px;
        }

        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, red 20%, white 20%, white 40%, red 40%, red 60%, white 60%, white 80%, red 80%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .target:active {
            transform: scale(0.8);
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            text-align: center;
            border: 2px solid red;
            display: none;
            z-index: 10;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Sniper Training</h1>
    
    <div id="ui">
        <div>Pontos: <span id="score">0</span></div>
        <div>Tempo: <span id="timer">30</span>s</div>
    </div>

    <div id="game-viewport">
        <div id="game-over">
            <h2>Fim de Jogo!</h2>
            <p>Sua pontuação final: <span id="final-score">0</span></p>
            <button onclick="startGame()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('game-viewport');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let targetTimer;

        function createTarget() {
            if (!gameActive) return;

            // Remove alvo anterior se existir
            const oldTarget = document.querySelector('.target');
            if (oldTarget) oldTarget.remove();

            const target = document.createElement('div');
            target.className = 'target';

            // Posição aleatória dentro do viewport
            const x = Math.random() * (viewport.clientWidth - 60);
            const y = Math.random() * (viewport.clientHeight - 60);

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            target.onclick = () => {
                if (gameActive) {
                    score++;
                    scoreElement.innerText = score;
                    target.remove();
                    createTarget(); // Cria um novo imediatamente ao acertar
                }
            };

            viewport.appendChild(target);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;
            gameOverScreen.style.display = 'none';

            // Ciclo do Cronômetro
            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
            }, 1000);

            createTarget();
        }

        function endGame() {
            gameActive = false;
            const target = document.querySelector('.target');
            if (target) target.remove();
            
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        // Inicia automaticamente
        startGame();
    </script>
</body>
</html>
