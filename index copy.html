<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sinuca JS</title>
    <style>
        body { background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 15px solid #5d4037; border-radius: 10px; background: #2e7d32; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        .instrucoes { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

<div class="instrucoes">
    <h2>Sinuca Minimalista</h2>
    <p>Clique e arraste para trás da bola branca para dar o efeito de taco.</p>
</div>

<canvas id="poolTable" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('poolTable');
    const ctx = canvas.getContext('2d');

    // Configurações básicas
    const friction = 0.985; // Desaceleração das bolas
    let isDragging = false;
    let mousePos = { x: 0, y: 0 };

    class Ball {
        constructor(x, y, radius, color, isWhite = false) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.velX = 0;
            this.velY = 0;
            this.isWhite = isWhite;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.closePath();
        }

        update() {
            // Aplicar movimento
            this.x += this.velX;
            this.y += this.velY;

            // Aplicar atrito
            this.velX *= friction;
            this.velY *= friction;

            // Parar se a velocidade for muito baixa
            if (Math.abs(this.velX) < 0.1) this.velX = 0;
            if (Math.abs(this.velY) < 0.1) this.velY = 0;

            // Colisão com as bordas
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.velX = -this.velX;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.velY = -this.velY;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
        }
    }

    // Inicializar bolas

        new Ball(550, 200, 12, 'red'),
        new Ball(575, 185, 12, 'yellow'),
