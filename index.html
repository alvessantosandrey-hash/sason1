<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá, Mundo! com Estilo UFC</title>
    <style>
        body {
            background-color: #1a1a1a; /* Fundo escuro para combinar com luta */
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 6px solid #d20a0a; /* Vermelho UFC */
            max-width: 400px;
        }

        h1 { color: #222; text-transform: uppercase; }
        p { color: #555; margin-bottom: 25px; }

        /* --- ESTILO DO BOTÃO UFC --- */
        .btn-ufc {
            display: inline-block;
            padding: 20px 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            text-transform: uppercase;
            
            /* Imagem de fundo (Luvas) */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://img.freepik.com/fotos-premium/luvas-de-boxe-pretas-isoladas-no-fundo-branco_104677-440.jpg');
            background-size: cover;
            background-position: center;
            
            border: 2px solid #d20a0a;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-ufc:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(210, 10, 10, 0.4);
            background-image: linear-gradient(rgba(210,10,10,0.4), rgba(210,10,10,0.4)), 
                              url('https://img.freepik.com/fotos-premium/luvas-de-boxe-pretas-isoladas-no-fundo-branco_104677-440.jpg');
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Olá, mundo!</h1>
        <p>Prepare-se para o combate.</p>
        
        <a href="https://www.ufc.com.br" target="_blank" class="btn-ufc">
            Acessar UFC
        </a>
    </div>

</body>
</html>
