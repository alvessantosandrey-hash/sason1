<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC - Página Oficial</title>
    <style>
        /* Reset básico e centralização total */
        body {
            background-color: #000; /* Fundo preto estilo arena */
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .contenedor {
            background: #111; /* Cinza muito escuro */
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(210, 10, 10, 0.3); /* Brilho vermelho suave */
            text-align: center;
            border: 2px solid #d20a0a; /* Borda vermelha UFC */
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        p {
            color: #aaa;
            font-family: 'Arial', sans-serif;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- BOTÃO COM FUNDO DE LUVAS --- */
        .btn-ufc {
            display: block;
            padding: 25px;
            color: white;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.4rem;
            border-radius: 10px;
            text-transform: uppercase;
            
            /* Imagem de luvas com overlay escuro */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://img.freepik.com/fotos-premium/luvas-de-boxe-pretas-isoladas-no-fundo-branco_104677-440.jpg');
            background-size: cover;
            background-position: center;
            
            border: 3px solid #d20a0a;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 0 0 #d20a0a;
        }

        .btn-ufc:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(210, 10, 10, 0.6);
            border-color: #fff;
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>UFC</h1>
        <p>Prepare-se para o combate</p>
        
        <a href="https://www.ufc.com.br" target="_blank" class="btn-ufc">
            Acessar Site Oficial
        </a>
    </div>

</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Jogo de Luta</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #gameContainer { position: relative; border: 4px solid #fff; }
        canvas { background: #333; display: block; }
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .healthBar { width: 40%; height: 20px; background: red; border: 2px solid #fff; }
        .healthFill { height: 100%; background: #4caf50; width: 100%; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="ui">
        <div class="healthBar"><div id="p1Health" class="healthFill"></div></div>
        <div class="healthBar"><div id="p2Health" class="healthFill"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 800;
    canvas.height = 400;

    const gravity = 0.7;

    class Sprite {
        constructor({ position, velocity, color, offset }) {
            this.position = position;
            this.velocity = velocity;
            this.width = 50;
            this.height = 100;
            this.lastKey = '';
            this.attackBox = { position: { x: this.position.x, y: this.position.y }, offset, width: 100, height: 50 };
            this.color = color;
            this.isAttacking = false;
            this.health = 100;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.position.x, this.position.y, this.width, this.height);

            // Desenhar ataque se estiver atacando
            if (this.isAttacking) {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
            }
        }

        update() {
            this.draw();
            this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
            this.attackBox.position.y = this.position.y;

            this.position.x += this.velocity.x;
            this.position.y += this.velocity.y;

            // Gravidade e Chão
            if (this.position.y + this.height + this.velocity.y >= canvas.height) {
                this.velocity.y = 0;
            } else {
                this.velocity.y += gravity;
            }
        }

        attack() {
            this.isAttacking = true;
            setTimeout(() => { this.isAttacking = false; }, 100);
        }
    }

    const player1 = new Sprite({
        position: { x: 100, y: 0 },
        velocity: { x: 0, y: 0 },
        color: 'blue',
        offset: { x: 0, y: 0 }
    });

    const player2 = new Sprite({
        position: { x: 650, y: 0 },
        velocity: { x: 0, y: 0 },
        color: 'red',
        offset: { x: -50, y: 0 }
    });

    const keys = {
        a: { pressed: false }, d: { pressed: false }, w: { pressed: false },
        ArrowRight: { pressed: false }, ArrowLeft: { pressed: false }, ArrowUp: { pressed: false }
    };

    function rectangularCollision({ rect1, rect2 }) {
        return (
            rect1.attackBox.position.x + rect1.attackBox.width >= rect2.position.x &&
            rect1.attackBox.position.x <= rect2.position.x + rect2.width &&
            rect1.attackBox.position.y + rect1.attackBox.height >= rect2.position.y &&
            rect1.attackBox.position.y <= rect2.position.y + rect2.height
        );
    }

    function animate() {
        window.requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        player1.update();
        player2.update();

        // Movimento P1
        player1.velocity.x = 0;
        if (keys.a.pressed) player1.velocity.x = -5;
        else if (keys.d.pressed) player1.velocity.x = 5;

        // Movimento P2
        player2.velocity.x = 0;
        if (keys.ArrowLeft.pressed) player2.velocity.x = -5;
        else if (keys.ArrowRight.pressed) player2.velocity.x = 5;

        // Detectar Colisão de Ataque P1
        if (rectangularCollision({ rect1: player1, rect2: player2 }) && player1.isAttacking) {
            player1.isAttacking = false;
            player2.health -= 10;
            document.getElementById('p2Health').style.width = player2.health + '%';
        }

        // Detectar Colisão de Ataque P2
        if (rectangularCollision({ rect1: player2, rect2: player1 }) && player2.isAttacking) {
            player2.isAttacking = false;
            player1.health -= 10;
            document.getElementById('p1Health').style.width = player1.health + '%';
        }

        if (player1.health <= 0 || player2.health <= 0) {
            alert(player1.health <= 0 ? "Player 2 Ganhou!" : "Player 1 Ganhou!");
            location.reload();
        }
    }

    animate();

    window.addEventListener('keydown', (event) => {
        switch (event.key) {
            case 'd': keys.d.pressed = true; break;
            case 'a': keys.a.pressed = true; break;
            case 'w': if(player1.velocity.y === 0) player1.velocity.y = -15; break;
            case ' ': player1.attack(); break;

            case 'ArrowRight': keys.ArrowRight.pressed = true; break;
            case 'ArrowLeft': keys.ArrowLeft.pressed = true; break;
            case 'ArrowUp': if(player2.velocity.y === 0) player2.velocity.y = -15; break;
            case 'm': player2.attack(); break;
        }
    });

    window.addEventListener('keyup', (event) => {
        switch (event.key) {
            case 'd': keys.d.pressed = false; break;
            case 'a': keys.a.pressed = false; break;
            case 'ArrowRight': keys.ArrowRight.pressed = false; break;
            case 'ArrowLeft': keys.ArrowLeft.pressed = false; break;
        }
    });
</script>
</body>
</html>
