<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zumbi Shooter Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: #111; cursor: crosshair; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #ff4444; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">PONTOS: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        const keys = {}; // Armazena teclas pressionadas

        // Configurações de Velocidade
        const PLAYER_SPEED = 5;
        const BULLET_SPEED = 10;
        const ENEMY_SPEED_MIN = 2;
        const ENEMY_SPEED_MAX = 4;
        const SPAWN_RATE = 600; // Milissegundos (menor = mais rápido)

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.radius = 15;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            }
            update() {
                if (keys['w'] || keys['ArrowUp']) this.y -= PLAYER_SPEED;
                if (keys['s'] || keys['ArrowDown']) this.y += PLAYER_SPEED;
                if (keys['a'] || keys['ArrowLeft']) this.x -= PLAYER_SPEED;
                if (keys['d'] || keys['ArrowRight']) this.x += PLAYER_SPEED;

                // Limites da tela
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
            }
        }

        class Projectile {
            constructor(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.radius = 4;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#f1c40f';
                ctx.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        class Enemy {
            constructor(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.radius = 18;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#27ae60';
                ctx.fill();
            }
            update() {
                // Persegue o jogador constantemente
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * (Math.random() * (ENEMY_SPEED_MAX - ENEMY_SPEED_MIN) + ENEMY_SPEED_MIN);
                this.y += Math.sin(angle) * (Math.random() * (ENEMY_SPEED_MAX - ENEMY_SPEED_MIN) + ENEMY_SPEED_MIN);
            }
        }

        const player = new Player();
        const projectiles = [];
        const enemies = [];

        // Controles
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        window.addEventListener('mousedown', (event) => {
            const angle = Math.atan2(event.clientY - player.y, event.clientX - player.x);
            const velocity = { x: Math.cos(angle) * BULLET_SPEED, y: Math.sin(angle) * BULLET_SPEED };
            projectiles.push(new Projectile(player.x, player.y, velocity));
        });

        function spawnEnemies() {
            if (!gameActive) return;
            const radius = 20;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }
            enemies.push(new Enemy(x, y));
            setTimeout(spawnEnemies, SPAWN_RATE);
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(17, 17, 17, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.update();
            player.draw();

            projectiles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(i, 1);
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();

                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer - enemy.radius - player.radius < 1) {
                    gameActive = false;
                    alert("FIM DE JOGO! Zumbis eliminados: " + score/10);
                    location.reload();
                }

                projectiles.forEach((p, pIndex) => {
                    const distToBullet = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (distToBullet - enemy.radius - p.radius < 1) {
                        enemies.splice(index, 1);
                        projectiles.splice(pIndex, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });
            });
        }

        spawnEnemies();
        animate();
    </script>
</body>
</html>
