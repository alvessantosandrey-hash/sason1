<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ping Pong - Velocidade Progressiva</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .placar { font-size: 50px; margin-bottom: 10px; font-weight: bold; }
        .velocidade-info { color: #0f0; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="placar">
        <span id="score1">0</span> : <span id="score2">0</span>
    </div>

    <canvas id="pong" width="800" height="400"></canvas>
    
    <div class="velocidade-info">Velocidade Atual: <span id="vel-txt">5.0</span></div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const velDisplay = document.getElementById("vel-txt");

        const INITIAL_SPEED = 5; // Velocidade base que volta após o ponto
        const SPEED_INCREMENT = 0.6; // O quanto acelera a cada rebatida

        const player1 = { x: 0, y: 160, w: 10, h: 80, score: 0 };
        const player2 = { x: canvas.width - 10, y: 160, w: 10, h: 80, score: 0 };
        const ball = { 
            x: canvas.width/2, 
            y: canvas.height/2, 
            radius: 8, 
            speed: INITIAL_SPEED, 
            velocityX: INITIAL_SPEED, 
            velocityY: INITIAL_SPEED 
        };

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            // VOLTA PARA A VELOCIDADE NORMAL
            ball.speed = INITIAL_SPEED; 
            
            // Inverte a direção de quem saca e reseta vetores
            ball.velocityX = (ball.velocityX > 0 ? -1 : 1) * INITIAL_SPEED;
            ball.velocityY = (Math.random() > 0.5 ? 1 : -1) * INITIAL_SPEED;
            
            atualizarVelocidadeTexto();
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && b.x - b.radius < p.x + p.w &&
                   b.y + b.radius > p.y && b.y - b.radius < p.y + p.h;
        }

        function atualizarVelocidadeTexto() {
            velDisplay.innerText = ball.speed.toFixed(1);
        }

        function update() {
            // Movimento Jogadores
            if (keys['KeyW'] && player1.y > 0) player1.y -= 8;
            if (keys['KeyS'] && player1.y < canvas.height - player1.h) player1.y += 8;
            if (keys['ArrowUp'] && player2.y > 0) player2.y -= 8;
            if (keys['ArrowDown'] && player2.y < canvas.height - player2.h) player2.y += 8;

            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Colisão Paredes (Cima/Baixo)
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Colisão Raquetes
            let player = (ball.x < canvas.width / 2) ? player1 : player2;

            if (collision(ball, player)) {
                // Lógica de ângulo baseada onde a bola toca na raquete
                let collidePoint = (ball.y - (player.y + player.h/2)) / (player.h/2);
                let angleRad = (Math.PI / 4) * collidePoint;
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                // FICA MAIS RÁPIDO A CADA REBATIDA
                ball.speed += SPEED_INCREMENT;
                
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);
                
                atualizarVelocidadeTexto();
            }

            // Pontuação
            if (ball.x - ball.radius < 0) {
                player2.score++;
                document.getElementById("score2").innerText = player2.score;
                resetBall(); // Aqui a velocidade volta ao normal
            } else if (ball.x + ball.radius > canvas.width) {
                player1.score++;
                document.getElementById("score1").innerText = player1.score;
                resetBall(); // Aqui a velocidade volta ao normal
            }
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Rede
            ctx.strokeStyle = "#333";
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();

            // Jogadores
            ctx.fillStyle = "#fff";
            ctx.fillRect(player1.x, player1.y, player1.w, player1.h);
            ctx.fillRect(player2.x, player2.y, player2.w, player2.h);

            // Bola
            ctx.fillStyle = "#0f0";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>

    <title>Galeria de Bandeiras Mundiais</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 30px;
        }

        /* Grid que organiza as bandeiras */
        .flag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estilo de cada "card" de bandeira */
        .flag-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .flag-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .flag-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #eee;
            display: block;
            margin-bottom: 10px;
        }

        .flag-card span {
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
            display: block;
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 480px) {
            .flag-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
