        const keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        class Player {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y;
                this.angle = 0; this.hp = 100;
                this.color = color; this.controls = controls;
                this.radius = 15; this.speed = 3; this.rotSpeed = 0.05;
                this.lastShot = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Corpo do tanque
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                
                // Canhão
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(this.radius + 10, 0);
                ctx.stroke();
                ctx.restore();
            }

            update() {
                if (keys[this.controls.left]) this.angle -= this.rotSpeed;
                if (keys[this.controls.right]) this.angle += this.rotSpeed;
                
                if (keys[this.controls.up]) {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
                if (keys[this.controls.down]) {
                    this.x -= Math.cos(this.angle) * this.speed;
                    this.y -= Math.sin(this.angle) * this.speed;
                }

                // Bordas
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                if (keys[this.controls.shoot] && Date.now() - this.lastShot > 400) {
                    bullets.push(new Bullet(this.x, this.y, this.angle, this.color));
                    this.lastShot = Date.now();
                }
            }
        }

        class Bullet {
            constructor(x, y, angle, color) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * 7;
                this.vy = Math.sin(angle) * 7;
                this.color = color;
                this.life = 100; // Tempo de vida da bala
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
        }

        const p2 = new Player(700, 250, '#00ff88', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' });
        p2.angle = Math.PI; // Começa virado para a esquerda

        let bullets = [];

        function loop() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)'; // Efeito de rastro
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            p1.update(); p1.draw();
            p2.update(); p2.draw();

            bullets.forEach((b, i) => {
                b.update(); b.draw();

                // Colisão com P1
                let d1 = Math.hypot(b.x - p1.x, b.y - p1.y);
                if (d1 < p1.radius && b.color !== p1.color) {
                    p1.hp -= 10;
                    bullets.splice(i, 1);
                }
                // Colisão com P2
                let d2 = Math.hypot(b.x - p2.x, b.y - p2.y);
                if (d2 < p2.radius && b.color !== p2.color) {
                    p2.hp -= 10;
                    bullets.splice(i, 1);
                }

                if (b.life <= 0) bullets.splice(i, 1);

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laser Duel 2P</title>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden;
        }
        canvas { 
            background: #000; 
            border: 2px solid #333; 
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1); 
        }
        .scoreboard {
            width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .p1-text { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .p2-text { color: #ff00ea; text-shadow: 0 0 10px #ff00ea; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="p1-text">CYBER BLUE: <span id="s1">0</span></div>
        <div class="p2-text">NEON PINK: <span id="s2">0</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        const p1 = { x: 50, y: 200, w: 20, h: 40, score: 0, color: '#00f2ff', laserKey: 'KeyD' };
        const p2 = { x: 730, y: 200, w: 20, h: 40, score: 0, color: '#ff00ea', laserKey: 'ArrowLeft' };
        
        let lasers = [];

        function drawShip(p) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0; // Reset para não pesar no desempenho
        }

        function createLaser(p, dir) {
            if (Date.now() - (p.lastShot || 0) > 300) {
                lasers.push({
                    x: dir === 1 ? p.x + p.w : p.x,
                    y: p.y + p.h / 2,
                    vx: dir * 12,
                    color: p.color
                });
                p.lastShot = Date.now();
            }
        }

        function update() {
            // Movimento P1 (W, S)
            if (keys['KeyW'] && p1.y > 0) p1.y -= 6;
            if (keys['KeyS'] && p1.y < canvas.height - p1.h) p1.y += 6;
            if (keys[p1.laserKey]) createLaser(p1, 1);

            // Movimento P2 (Setas)
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= 6;
            if (keys['ArrowDown'] && p2.y < canvas.height - p2.h) p2.y += 6;
            if (keys[p2.laserKey]) createLaser(p2, -1);

            lasers.forEach((l, i) => {
                l.x += l.vx;

                // Colisão P1
                if (l.vx < 0 && l.x < p1.x + p1.w && l.x > p1.x && l.y > p1.y && l.y < p1.y + p1.h) {
                    p2.score++;
                    lasers.splice(i, 1);
                }
                // Colisão P2
                else if (l.vx > 0 && l.x > p2.x && l.x < p2.x + p2.w && l.y > p2.y && l.y < p2.y + p2.h) {
                    p1.score++;
                    lasers.splice(i, 1);
                }

                // Remover fora da tela
                if (l.x < 0 || l.x > canvas.width) lasers.splice(i, 1);
            });

            document.getElementById('s1').innerText = p1.score;
            document.getElementById('s2').innerText = p2.score;
        }

        function draw() {
            // Fundo com leve rastro
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawShip(p1);
            drawShip(p2);

            // Desenhar Lasers
            lasers.forEach(l => {
                ctx.strokeStyle = l.color;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = l.color;
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x - (l.vx * 1.5), l.y); // Rastro do laser
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
