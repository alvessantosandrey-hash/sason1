<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Hunt - Floresta Sombria</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f0f0f; /* Mais escuro para o tema de monstros */
            color: #00ff41; /* Verde neon estilo hacker/monstro */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #ui {
            margin-bottom: 15px;
            font-size: 28px;
            display: flex;
            gap: 30px;
            text-shadow: 2px 2px 5px black;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            /* Fundo de floresta noturna */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80') center/cover;
            border: 5px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            overflow: hidden;
            border-radius: 8px;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            /* Animação de surgimento */
            animation: appear 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
        }

        @keyframes appear {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .target.hit {
            transform: scale(1.5);
            opacity: 0;
            transition: 0.2s;
            filter: brightness(2) saturate(2);
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            border: 2px solid #ff4444;
            z-index: 10;
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Monstros Abatidos: <span id="score">0</span></div>
        <div>Tempo Restante: <span id="timer">30</span>s</div>
    </div>

    <div id="game-container">
        <div id="game-over">
            <h2 style="color: #ff4444;">MISSÃO ENCERRADA</h2>
            <p>Você eliminou <span id="final-score">0</span> monstros!</p>
            <button onclick="startGame()">CAÇAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        const monsters = ['👾', '👹', '👻', '👽', '🧛', '🧟'];
        
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let spawnInterval;
        let countdownInterval;

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;
            gameOverScreen.style.display = 'none';

            document.querySelectorAll('.target').forEach(t => t.remove());

            // Loop de criação de monstros (diminuído para 700ms para ser mais difícil)
            spawnInterval = setInterval(createMonster, 700);
            countdownInterval = setInterval(updateTimer, 1000);
        }

        function createMonster() {
            if (!gameActive) return;

            const monster = document.createElement('div');
            monster.classList.add('target');
            
            // Escolhe um monstro aleatório da lista
            monster.innerText = monsters[Math.floor(Math.random() * monsters.length)];

            const x = Math.random() * (container.offsetWidth - 90);
            const y = Math.random() * (container.offsetHeight - 90);

            monster.style.left = `${x}px`;
            monster.style.top = `${y}px`;

            monster.addEventListener('mousedown', () => {
                if (gameActive && !monster.classList.contains('hit')) {
                    score += 1;
                    scoreElement.innerText = score;
                    monster.classList.add('hit');
                    
                    // Pequeno atraso para mostrar o efeito de "hit" antes de remover
                    setTimeout(() => monster.remove(), 200);
                }
            });

            container.appendChild(monster);

            // Monstros desaparecem mais rápido conforme o jogo avança
            let vanishTime = 1200; 
            setTimeout(() => {
                if (monster.parentNode) {
                    monster.remove();
                }
            }, vanishTime);
        }

        function updateTimer() {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            clearInterval(countdownInterval);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        startGame();
    </script>
</body>
</html>
