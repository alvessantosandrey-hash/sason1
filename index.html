<head>
    <meta charset="UTF-8">
    <title>Laser Duel 2P</title>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden;
        }
        canvas { 
            background: #000; 
            border: 2px solid #333; 
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1); 
        }
        .scoreboard {
            width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .p1-text { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .p2-text { color: #ff00ea; text-shadow: 0 0 10px #ff00ea; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="p1-text">CYBER BLUE: <span id="s1">0</span></div>
        <div class="p2-text">NEON PINK: <span id="s2">0</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        const p1 = { x: 50, y: 200, w: 20, h: 40, score: 0, color: '#00f2ff', laserKey: 'KeyD' };
        const p2 = { x: 730, y: 200, w: 20, h: 40, score: 0, color: '#ff00ea', laserKey: 'ArrowLeft' };
        
        let lasers = [];

        function drawShip(p) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0; // Reset para não pesar no desempenho
        }

        function createLaser(p, dir) {
            if (Date.now() - (p.lastShot || 0) > 300) {
                lasers.push({
                    x: dir === 1 ? p.x + p.w : p.x,
                    y: p.y + p.h / 2,
                    vx: dir * 12,
                    color: p.color
                });
                p.lastShot = Date.now();
            }
        }

        function update() {
            // Movimento P1 (W, S)
            if (keys['KeyW'] && p1.y > 0) p1.y -= 6;
            if (keys['KeyS'] && p1.y < canvas.height - p1.h) p1.y += 6;
            if (keys[p1.laserKey]) createLaser(p1, 1);

            // Movimento P2 (Setas)
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= 6;
            if (keys['ArrowDown'] && p2.y < canvas.height - p2.h) p2.y += 6;
            if (keys[p2.laserKey]) createLaser(p2, -1);

            lasers.forEach((l, i) => {
                l.x += l.vx;

                // Colisão P1
                if (l.vx < 0 && l.x < p1.x + p1.w && l.x > p1.x && l.y > p1.y && l.y < p1.y + p1.h) {
                    p2.score++;
                    lasers.splice(i, 1);
                }
                // Colisão P2
                else if (l.vx > 0 && l.x > p2.x && l.x < p2.x + p2.w && l.y > p2.y && l.y < p2.y + p2.h) {
                    p1.score++;
                    lasers.splice(i, 1);
                }

                // Remover fora da tela
                if (l.x < 0 || l.x > canvas.width) lasers.splice(i, 1);
            });

            document.getElementById('s1').innerText = p1.score;
            document.getElementById('s2').innerText = p2.score;
        }

        function draw() {
            // Fundo com leve rastro
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawShip(p1);
            drawShip(p2);

            // Desenhar Lasers
            lasers.forEach(l => {
                ctx.strokeStyle = l.color;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = l.color;
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x - (l.vx * 1.5), l.y); // Rastro do laser
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Game de Tiro</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <h2>Use as Setas para mover e ESPAÇO para atirar</h2>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configurações do Jogador
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 40,
            w: 30,
            h: 30,
            speed: 5,
            color: '#0095DD'
        };

        // Lista de tiros
        let bullets = [];
        const bulletSpeed = 7;

        // Controle de teclas
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function shoot() {
            bullets.push({
                x: player.x + player.w / 2 - 2,
                y: player.y,
                w: 4,
                h: 10,
                color: 'yellow'
            });
        }

        // Evento único para o tiro (evita metralhadora infinita ao segurar)
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') shoot();
        });

        function update() {
            // Movimentação
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Atualizar tiros
            bullets.forEach((bullet, index) => {
                bullet.y -= bulletSpeed;
                // Remover tiro se sair da tela
                if (bullet.y < 0) bullets.splice(index, 1);
            });
        }

        function draw() {
            // Limpar tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Jogador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Desenhar Tiros
            ctx.fillStyle = 'yellow';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        // Iniciar loop
        draw();
    </script>
</body>
</html>

<body>

    <div class="info">Pontos: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="500" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameActive = true;

        // Configuração do Jogador
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            w: 40,
            h: 40,
            speed: 7,
            color: '#00ffcc'
        };

        // Arrays de objetos
        let bullets = [];
        let enemies = [];
        const keys = {};

        // Controles
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameActive) shoot();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function shoot() {
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 5, h: 12 });
        }

        function spawnEnemy() {
            if (!gameActive) return;
            const size = 35;
            const x = Math.random() * (canvas.width - size);
            enemies.push({
                x: x,
                y: -size,
                w: size,
                h: size,
                speed: 2 + Math.random() * 2, // Velocidades variadas
                color: '#ff3366'
            });
        }

        // Criar inimigo a cada 1 segundo
        setInterval(spawnEnemy, 1000);

        function update() {
            if (!gameActive) return;

            // Movimentação do Jogador
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Movimentar Tiros
            bullets.forEach((b, index) => {
                b.y -= 10;
                if (b.y < 0) bullets.splice(index, 1);
            });

            // Movimentar Inimigos
            enemies.forEach((en, enIdx) => {
                en.y += en.speed;

                // Verificar Colisão com Jogador
                if (player.x < en.x + en.w && player.x + player.w > en.x &&
                    player.y < en.y + en.h && player.y + player.h > en.y) {
                    gameOver();
                }

                // Verificar se o inimigo passou (Game Over)
                if (en.y > canvas.height) gameOver();

                // Colisão Tiro vs Inimigo
                bullets.forEach((b, bIdx) => {
                    if (b.x < en.x + en.w && b.x + b.w > en.x &&
                        b.y < en.y + en.h && b.y + b.h > en.y) {
                        
                        // Remover ambos e somar pontos
                        setTimeout(() => {
                            enemies.splice(enIdx, 1);
                            bullets.splice(bIdx, 1);
                            score += 10;
                            scoreDisplay.innerText = score;
                        }, 0);
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Jogador (Nave)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Desenhar Tiros
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Desenhar Inimigos
            enemies.forEach(en => {
                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y, en.w, en.h);
            });

            if (!gameActive) {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("Pressione F5 para reiniciar", canvas.width/2 - 110, canvas.height/2 + 40);
            }

            update();
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
