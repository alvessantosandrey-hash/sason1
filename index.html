        const keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        class Player {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y;
                this.angle = 0; this.hp = 100;
                this.color = color; this.controls = controls;
                this.radius = 15; this.speed = 3; this.rotSpeed = 0.05;
                this.lastShot = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Corpo do tanque
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                
                // Canhão
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(this.radius + 10, 0);
                ctx.stroke();
                ctx.restore();
            }

            update() {
                if (keys[this.controls.left]) this.angle -= this.rotSpeed;
                if (keys[this.controls.right]) this.angle += this.rotSpeed;
                
                if (keys[this.controls.up]) {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
                if (keys[this.controls.down]) {
                    this.x -= Math.cos(this.angle) * this.speed;
                    this.y -= Math.sin(this.angle) * this.speed;
                }

                // Bordas
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                if (keys[this.controls.shoot] && Date.now() - this.lastShot > 400) {
                    bullets.push(new Bullet(this.x, this.y, this.angle, this.color));
                    this.lastShot = Date.now();
                }
            }
        }

        class Bullet {
            constructor(x, y, angle, color) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * 7;
                this.vy = Math.sin(angle) * 7;
                this.color = color;
                this.life = 100; // Tempo de vida da bala
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
        }

        const p2 = new Player(700, 250, '#00ff88', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' });
        p2.angle = Math.PI; // Começa virado para a esquerda

        let bullets = [];

        function loop() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)'; // Efeito de rastro
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            p1.update(); p1.draw();
            p2.update(); p2.draw();

            bullets.forEach((b, i) => {
                b.update(); b.draw();

                // Colisão com P1
                let d1 = Math.hypot(b.x - p1.x, b.y - p1.y);
                if (d1 < p1.radius && b.color !== p1.color) {
                    p1.hp -= 10;
                    bullets.splice(i, 1);
                }
                // Colisão com P2
                let d2 = Math.hypot(b.x - p2.x, b.y - p2.y);

                    p2.hp -= 10;
                    bullets.splice(i, 1);
                }
