<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC - Página Oficial</title>
    <style>
        /* Reset básico e centralização total */
        body {
            background-color: #000; /* Fundo preto estilo arena */
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .contenedor {
            background: #111; /* Cinza muito escuro */
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(210, 10, 10, 0.3); /* Brilho vermelho suave */
            text-align: center;
            border: 2px solid #d20a0a; /* Borda vermelha UFC */
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        p {
            color: #aaa;
            font-family: 'Arial', sans-serif;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- BOTÃO COM FUNDO DE LUVAS --- */
        .btn-ufc {
            display: block;
            padding: 25px;
            color: white;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.4rem;
            border-radius: 10px;
            text-transform: uppercase;
            
            /* Imagem de luvas com overlay escuro */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://img.freepik.com/fotos-premium/luvas-de-boxe-pretas-isoladas-no-fundo-branco_104677-440.jpg');
            background-size: cover;
            background-position: center;
            
            border: 3px solid #d20a0a;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 0 0 #d20a0a;
        }

        .btn-ufc:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(210, 10, 10, 0.6);
            border-color: #fff;
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>UFC</h1>
        <p>Prepare-se para o combate</p>
        
        <a href="https://www.ufc.com.br" target="_blank" class="btn-ufc">
            Acessar Site Oficial
        </a>
    </div>

</body>
</html>
